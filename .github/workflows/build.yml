name: Build AUR packages

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Cache paru package
        uses: actions/cache@v3
        id: cache-paru
        with:
          path: /tmp/paru/*.pkg.tar.zst
          key: paru-${{ hashFiles('packages.txt') }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Setup build environment
        run: |
          pacman-key --init
          pacman -Syu --noconfirm git sudo rust cargo
          useradd -m builder
          mkdir -p /home/builder/out /home/builder/repo
          chown -R builder:builder /home/builder
    
          if [ -d /tmp/paru ] && ls /tmp/paru/*.pkg.tar.zst 1>/dev/null 2>&1; then
            pacman -U --noconfirm /tmp/paru/*.pkg.tar.zst
          else
            su builder -c "git clone https://aur.archlinux.org/paru.git /tmp/paru"
            su builder -c "cd /tmp/paru && makepkg -si --noconfirm"
          fi
          pacman -Rdd --noconfirm rust || true

      - name: Build packages
        run: |
          set -e
          PACKAGES=$(cat packages.txt | grep -v '^#' | tr '\n' ' ')
          for pkg in $PACKAGES; do
            echo "Building $pkg"
            su builder -c "OPTIONS=(!debug strip) PKGDEST=~/out paru -S --noconfirm --noprogressbar --removemake --cleanafter $pkg"
          done
          find /home/builder/out -name "*.pkg.tar.zst" -exec cp {} /home/builder/repo/ \;
          cd /home/builder/repo
          repo-add myrepo.db.tar.gz *.pkg.tar.zst

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false
