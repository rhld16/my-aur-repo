name: Build AUR packages

on:
  push:
    paths: [packages.txt]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman-key --init
          pacman -Syu --noconfirm git sudo rust cargo

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          # Build paru from source so it links against the current libalpm
          su builder -c "
            git clone https://aur.archlinux.org/paru.git /tmp/paru
            cd /tmp/paru
            makepkg -si --noconfirm
          "

          # Remove rust now so packages that need rustup aren't blocked
          pacman -Rdd --noconfirm rust || true

      - name: Build packages
        run: |
          mkdir -p repo
          while IFS= read -r pkg || [[ -n "$pkg" ]]; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            echo "==> Building $pkg"

            su builder -c "
              mkdir -p ~/build
              cd ~/build
              paru --getpkgbuild $pkg
              cd $pkg
              PKGDEST=~/out makepkg -s --noconfirm --noprogressbar
            " || echo "WARNING: failed to build $pkg, skipping"

          done < packages.txt

          find /home/builder/out -name "*.pkg.tar.zst" -exec cp {} repo/ \; 2>/dev/null || true

      - name: Create pacman repo database
        run: |
          cd repo
          shopt -s nullglob
          pkgs=(*.pkg.tar.zst)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "ERROR: No packages were built"
            exit 1
          fi
          repo-add myrepo.db.tar.gz "${pkgs[@]}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false