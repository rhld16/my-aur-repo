name: Build AUR packages

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          pacman-key --init
          pacman -Syu --noconfirm git sudo rust cargo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su builder -c "git clone https://aur.archlinux.org/paru.git /tmp/paru && cd /tmp/paru && makepkg -si --noconfirm"
          pacman -Rdd --noconfirm rust || true

      - name: Build packages
        run: |
          mkdir -p /home/builder/out repo
          chown builder:builder /home/builder/out
          while IFS= read -r pkg || [[ -n "$pkg" ]]; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            pacman -Rdd --noconfirm rust 2>/dev/null || true
            su builder -c "OPTIONS=(!debug strip) PKGDEST=~/out paru -S --noconfirm --noprogressbar --removemake --cleanafter $pkg" \
              || echo "WARNING: failed to build $pkg, skipping"
          done < packages.txt
          find /home/builder/out -name "*.pkg.tar.zst" -exec cp {} repo/ \;
          cd repo && repo-add myrepo.db.tar.gz *.pkg.tar.zst

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false